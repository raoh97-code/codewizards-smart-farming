<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Farming Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 20px;">
        <i class="fa-solid fa-leaf" style="font-size: 3rem; color: var(--primary);"></i>
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to access your farming dashboard</p>

      <div id="login-error" class="error-message">
        <i class="fa-solid fa-circle-exclamation"></i> Invalid email or password.
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login to Dashboard</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="/signup">Sign Up here</a></p>
        <p style="margin-top: 15px;"><a href="/" style="color: var(--text-muted);"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></p>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
