<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Smart Farming Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 10px;">
        <i class="fa-solid fa-leaf" style="font-size: 2.5rem; color: var(--primary);"></i>
      </div>
      <h2>Create an Account</h2>
      <p class="subtitle">Join the future of smart agriculture</p>

      <div id="signup-error" class="error-message">
        <i class="fa-solid fa-circle-exclamation"></i> Passwords do not match.
      </div>

      <form id="signup-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="example@farm.com" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/login">Login here</a></p>
        <p style="margin-top: 10px;"><a href="/" style="color: var(--text-muted);"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></p>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
